<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Inicia sesión en EventBooking">
  <title>Iniciar Sesión - EventBooking</title>
  
  <link rel="stylesheet" href="assets/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="loader" class="loader" style="display: none;">
    <div class="loader-content">
      <div class="spinner"></div>
      <p class="loader-text">Procesando...</p>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <h1>Iniciar Sesión</h1>
        <p>Accede a tu cuenta EventBooking</p>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Tu usuario"
            required
            autocomplete="username"
          >
          <div class="form-error" id="usernameError"></div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Tu contraseña"
            required
            autocomplete="current-password"
          >
          <div class="form-error" id="passwordError"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block">
          Iniciar Sesión
        </button>
      </form>

      <div class="auth-footer">
        ¿No tienes cuenta? <a href="register.html">Registrate aquí</a>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/jwt-utils.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/guards.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/api.js"></script>

  <script>
    // Redirect if already authenticated
    if (StorageManager.isAuthenticated()) {
      window.location.href = '/events.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      // Clear errors
      document.getElementById('usernameError').textContent = '';
      document.getElementById('passwordError').textContent = '';

      // Validate
      let valid = true;
      if (!Utils.isValidUsername(username)) {
        document.getElementById('usernameError').textContent = 'Usuario debe tener 3-50 caracteres';
        valid = false;
      }

      if (!Utils.isValidPassword(password)) {
        document.getElementById('passwordError').textContent = 'Contraseña debe tener mínimo 6 caracteres';
        valid = false;
      }

      if (!valid) return;

      UIManager.showLoader('Iniciando sesión...');

      try {
        const response = await APIService.login(username, password);
        
        if (response && response.token) {
          UIManager.showToast('Sesión iniciada correctamente', 'success');
          setTimeout(() => {
            window.location.href = '/events.html';
          }, 500);
        }
      } catch (error) {
        UIManager.hideLoader();
        console.error('Login error:', error);
      }
    });
  </script>
</body>
</html>
