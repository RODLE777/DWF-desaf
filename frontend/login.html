<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Inicia sesión en EventBooking">
  <title>Iniciar Sesión - EventBooking</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/auth.css">
  
  <!-- Scripts -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/guards.js"></script>
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <h1>Iniciar Sesión</h1>
        <p>Accede a tu cuenta EventBooking</p>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="username" class="required">Usuario</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Ingresa tu usuario"
            required
            autocomplete="username"
            minlength="3"
            maxlength="50"
          >
          <div class="form-error" id="usernameError"></div>
        </div>

        <div class="form-group">
          <label for="password" class="required">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Ingresa tu contraseña"
            required
            autocomplete="current-password"
            minlength="6"
          >
          <div class="form-error" id="passwordError"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-large btn-block">
          Iniciar Sesión
        </button>
      </form>

      <div class="auth-link">
        ¿No tienes cuenta?
        <a href="/register.html">Registrate aquí</a>
      </div>

      <div class="auth-link" style="margin-top: var(--spacing-lg);">
        <a href="/index.html">← Volver al inicio</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      // Validaciones
      let valid = true;
      document.getElementById('usernameError').textContent = '';
      document.getElementById('passwordError').textContent = '';

      if (!Utils.isValidUsername(username)) {
        document.getElementById('usernameError').textContent = 'El usuario debe tener entre 3 y 50 caracteres';
        valid = false;
      }

      if (!Utils.isValidPassword(password)) {
        document.getElementById('passwordError').textContent = 'La contraseña debe tener al menos 6 caracteres';
        valid = false;
      }

      if (!valid) return;

      const btn = document.querySelector('button[type="submit"]');
      UIService.disableButton(btn);

      try {
        const result = await AuthService.login({ username, password });

        if (result.success) {
          UIService.showSuccess('Sesión iniciada correctamente');
          setTimeout(() => {
            window.location.href = CONFIG.ROUTES.DASHBOARD;
          }, 500);
        } else {
          UIService.showErrorResponse(result.error);
        }
      } catch (error) {
        UIService.showErrorResponse(error);
      } finally {
        UIService.enableButton(btn);
      }
    });
  </script>
</body>
</html>
