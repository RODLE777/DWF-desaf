<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Crea una cuenta en EventBooking">
  <title>Registrarse - EventBooking</title>
  
  <link rel="stylesheet" href="assets/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="loader" class="loader" style="display: none;">
    <div class="loader-content">
      <div class="spinner"></div>
      <p class="loader-text">Creando cuenta...</p>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <h1>Crear Cuenta</h1>
        <p>Únete a EventBooking</p>
      </div>

      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="firstname">Nombre</label>
          <input type="text" id="firstname" name="firstname" placeholder="Tu nombre" required>
          <div class="form-error" id="firstnameError"></div>
        </div>

        <div class="form-group">
          <label for="lastname">Apellido</label>
          <input type="text" id="lastname" name="lastname" placeholder="Tu apellido" required>
          <div class="form-error" id="lastnameError"></div>
        </div>

        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" name="username" placeholder="Username único" required>
          <div class="form-error" id="usernameError"></div>
        </div>

        <div class="form-group">
          <label for="age">Edad</label>
          <input type="number" id="age" name="age" placeholder="18" required min="1" max="150">
          <div class="form-error" id="ageError"></div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required>
          <div class="form-error" id="passwordError"></div>
        </div>

        <div class="form-group">
          <label for="passwordConfirm">Confirmar Contraseña</label>
          <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="Repite tu contraseña" required>
          <div class="form-error" id="passwordConfirmError"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block">
          Crear Cuenta
        </button>
      </form>

      <div class="auth-footer">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/jwt-utils.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/guards.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/api.js"></script>

  <script>
    // Redirect if already authenticated
    if (StorageManager.isAuthenticated()) {
      window.location.href = '/events.html';
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const firstname = document.getElementById('firstname').value.trim();
      const lastname = document.getElementById('lastname').value.trim();
      const username = document.getElementById('username').value.trim();
      const age = document.getElementById('age').value;
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('passwordConfirm').value;

      // Clear errors
      document.querySelectorAll('.form-error').forEach(el => el.textContent = '');

      // Validate
      let valid = true;

      if (!firstname) {
        document.getElementById('firstnameError').textContent = 'El nombre es obligatorio';
        valid = false;
      }

      if (!lastname) {
        document.getElementById('lastnameError').textContent = 'El apellido es obligatorio';
        valid = false;
      }

      if (!Utils.isValidUsername(username)) {
        document.getElementById('usernameError').textContent = 'Usuario: 3-50 caracteres';
        valid = false;
      }

      if (!Utils.isValidAge(age)) {
        document.getElementById('ageError').textContent = 'Edad: 1-150 años';
        valid = false;
      }

      if (!Utils.isValidPassword(password)) {
        document.getElementById('passwordError').textContent = 'Mínimo 6 caracteres';
        valid = false;
      }

      if (password !== passwordConfirm) {
        document.getElementById('passwordConfirmError').textContent = 'Las contraseñas no coinciden';
        valid = false;
      }

      if (!valid) return;

      UIManager.showLoader('Creando cuenta...');

      try {
        const response = await APIService.register(username, firstname, lastname, age, password);
        
        if (response && response.token) {
          UIManager.showToast('Cuenta creada correctamente', 'success');
          StorageManager.setToken(response.token);
          if (response.refreshToken) {
            StorageManager.setRefreshToken(response.refreshToken);
          }
          setTimeout(() => {
            window.location.href = '/events.html';
          }, 500);
        }
      } catch (error) {
        UIManager.hideLoader();
        console.error('Register error:', error);
      }
    });
  </script>
</body>
</html>
