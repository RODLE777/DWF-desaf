<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Crea una cuenta en EventBooking">
  <title>Registrarse - EventBooking</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/auth.css">
  
  <!-- Scripts -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/guards.js"></script>
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <h1>Crear Cuenta</h1>
        <p>Únete a EventBooking</p>
      </div>

      <form id="registerForm" class="auth-form">
        <div class="form-row">
          <div class="form-group">
            <label for="firstname" class="required">Nombre</label>
            <input
              type="text"
              id="firstname"
              name="firstname"
              placeholder="Ingresa tu nombre"
              required
              autocomplete="given-name"
            >
            <div class="form-error" id="firstnameError"></div>
          </div>

          <div class="form-group">
            <label for="lastname" class="required">Apellido</label>
            <input
              type="text"
              id="lastname"
              name="lastname"
              placeholder="Ingresa tu apellido"
              required
              autocomplete="family-name"
            >
            <div class="form-error" id="lastnameError"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="username" class="required">Usuario</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Elige un usuario único"
            required
            autocomplete="username"
            minlength="3"
            maxlength="50"
          >
          <div class="form-error" id="usernameError"></div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="age" class="required">Edad</label>
            <input
              type="number"
              id="age"
              name="age"
              placeholder="18"
              required
              min="1"
              max="150"
              autocomplete="off"
            >
            <div class="form-error" id="ageError"></div>
          </div>

          <div class="form-group">
            <label for="password" class="required">Contraseña</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Al menos 6 caracteres"
              required
              autocomplete="new-password"
              minlength="6"
            >
            <div class="form-error" id="passwordError"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="passwordConfirm" class="required">Confirmar Contraseña</label>
          <input
            type="password"
            id="passwordConfirm"
            name="passwordConfirm"
            placeholder="Repite tu contraseña"
            required
            autocomplete="new-password"
            minlength="6"
          >
          <div class="form-error" id="passwordConfirmError"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-large btn-block">
          Crear Cuenta
        </button>
      </form>

      <div class="auth-link">
        ¿Ya tienes cuenta?
        <a href="/login.html">Inicia sesión</a>
      </div>

      <div class="auth-link" style="margin-top: var(--spacing-lg);">
        <a href="/index.html">← Volver al inicio</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const firstname = document.getElementById('firstname').value.trim();
      const lastname = document.getElementById('lastname').value.trim();
      const username = document.getElementById('username').value.trim();
      const age = document.getElementById('age').value;
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('passwordConfirm').value;

      // Limpiar errores
      document.querySelectorAll('.form-error').forEach(el => el.textContent = '');

      // Validaciones
      let valid = true;

      if (!firstname) {
        document.getElementById('firstnameError').textContent = 'El nombre es obligatorio';
        valid = false;
      }

      if (!lastname) {
        document.getElementById('lastnameError').textContent = 'El apellido es obligatorio';
        valid = false;
      }

      if (!Utils.isValidUsername(username)) {
        document.getElementById('usernameError').textContent = 'El usuario debe tener entre 3 y 50 caracteres';
        valid = false;
      }

      if (!Utils.isValidAge(age)) {
        document.getElementById('ageError').textContent = 'La edad debe estar entre 1 y 150';
        valid = false;
      }

      if (!Utils.isValidPassword(password)) {
        document.getElementById('passwordError').textContent = 'La contraseña debe tener al menos 6 caracteres';
        valid = false;
      }

      if (password !== passwordConfirm) {
        document.getElementById('passwordConfirmError').textContent = 'Las contraseñas no coinciden';
        valid = false;
      }

      if (!valid) return;

      const btn = document.querySelector('button[type="submit"]');
      UIService.disableButton(btn);

      try {
        const result = await AuthService.register({
          firstname,
          lastname,
          username,
          age,
          password
        });

        if (result.success) {
          UIService.showSuccess('Cuenta creada correctamente');
          setTimeout(() => {
            window.location.href = CONFIG.ROUTES.DASHBOARD;
          }, 500);
        } else {
          UIService.showErrorResponse(result.error);
        }
      } catch (error) {
        UIService.showErrorResponse(error);
      } finally {
        UIService.enableButton(btn);
      }
    });
  </script>
</body>
</html>
