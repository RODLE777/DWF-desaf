<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dashboard - EventBooking">
  <title>Dashboard - EventBooking</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/events.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  
  <!-- Scripts -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/guards.js"></script>
</head>
<body>
  <!-- Navbar -->
  <header>
    <nav class="navbar">
      <div class="navbar-brand">🎫 EventBooking</div>
      <ul class="navbar-nav">
        <li><a href="/dashboard.html" class="active">Dashboard</a></li>
        <li><a href="/events.html">Eventos</a></li>
        <li><a href="/bookings.html">Mis Reservas</a></li>
        <li data-role="admin" style="display: none;"><a href="/admin.html">Administración</a></li>
      </ul>
      <div class="user-menu">
        <div class="user-info">
          <span id="user-name">Usuario</span>
          <div class="user-avatar"><span id="user-initial">U</span></div>
        </div>
        <button class="logout-btn" onclick="AuthService.logout()">Salir</button>
      </div>
    </nav>
  </header>

  <!-- Dashboard Content -->
  <div class="dashboard-container">
    <div class="main-content">
      <div class="page-header">
        <h1 class="page-title">Dashboard</h1>
      </div>

      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--spacing-lg); margin-bottom: var(--spacing-2xl);">
        <div class="stat-card">
          <div class="stat-value" id="totalEvents">-</div>
          <div class="stat-label">Eventos Disponibles</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="myBookings">-</div>
          <div class="stat-label">Mis Reservas</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalSpent">-</div>
          <div class="stat-label">Gastado en Reservas</div>
        </div>
      </div>

      <div style="background-color: var(--color-surface); padding: var(--spacing-lg); border-radius: var(--border-radius-lg); margin-bottom: var(--spacing-2xl);">
        <h3 style="margin-top: 0;">Próximos Eventos</h3>
        <div id="upcomingEvents" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: var(--spacing-lg);"></div>
      </div>

      <div style="text-align: center; padding: var(--spacing-2xl);">
        <a href="/events.html" class="btn btn-primary btn-large">Ver Todos los Eventos</a>
      </div>
    </div>
  </div>

  <script>
    async function loadDashboard() {
      try {
        UIService.updateNavigation();
        
        // Cargar estadísticas
        const bookingsRes = await api.get(CONFIG.BOOKINGS.MY_BOOKINGS);
        const eventsRes = await api.get(CONFIG.EVENTS.LIST + '?page=0&size=100');
        
        // Actualizar estadísticas
        document.getElementById('myBookings').textContent = bookingsRes.content?.length || 0;
        document.getElementById('totalEvents').textContent = eventsRes.totalElements || 0;

        const totalSpent = bookingsRes.content?.reduce((sum, b) => sum + (b.totalAmount || 0), 0) || 0;
        document.getElementById('totalSpent').textContent = Utils.formatCurrency(totalSpent);

        // Mostrar próximos eventos
        if (eventsRes.content && eventsRes.content.length > 0) {
          const upcoming = eventsRes.content.slice(0, 3);
          const html = upcoming.map(event => `
            <div class="event-card">
              <div class="event-card-image">📅</div>
              <div class="event-card-content">
                <h3 class="event-card-title">${event.title}</h3>
                <div class="event-card-date">📅 ${Utils.formatDate(event.eventDate)}</div>
                <div class="event-card-price">${Utils.formatCurrency(event.pricePerTicket)}</div>
                <a href="/event-detail.html?id=${event.idEvent}" class="btn btn-primary btn-small" style="width: 100%; text-align: center;">Ver Detalles</a>
              </div>
            </div>
          `).join('');
          document.getElementById('upcomingEvents').innerHTML = html;
        } else {
          document.getElementById('upcomingEvents').innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--color-text-secondary);">No hay eventos disponibles</p>';
        }
      } catch (error) {
        console.error('[Dashboard] Error:', error);
        UIService.showError('Error al cargar el dashboard');
      }
    }

    document.addEventListener('DOMContentLoaded', loadDashboard);
  </script>
</body>
</html>
