<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistema de Reservas de Eventos - Plataforma profesional de reservas">
  <title>Sistema de Reservas de Eventos</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/auth.css">
  
  <!-- Scripts -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/guards.js"></script>

<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <h1>EventBooking</h1>
        <p>Bienvenido a nuestro sistema de reservas</p>
      </div>

      <div class="auth-form">
        <p style="color: var(--color-text-secondary); margin-bottom: var(--spacing-xl);">
          Selecciona una opción para continuar:
        </p>

        <a href="/login.html" class="btn btn-primary btn-large btn-block">
          Iniciar Sesión
        </a>

        <a href="/register.html" class="btn btn-secondary btn-large btn-block" style="border: 1px solid var(--color-border);">
          Crear Cuenta
        </a>
      </div>

      <div class="auth-divider"></div>

      <div class="text-center text-muted">
        <p style="margin: 0; font-size: var(--font-size-sm);">
          © 2024 EventBooking. Todos los derechos reservados.
        </p>
      </div>
    </div>
  </div>
