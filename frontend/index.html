<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistema de Reservas de Eventos - Plataforma profesional de reservas">
  <title>Sistema de Reservas de Eventos</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/styles.css">
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  
  <!-- Scripts -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/jwt-utils.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/guards.js"></script>
</head>
<body>
  <div id="loader" class="loader" style="display: none;">
    <div class="loader-content">
      <div class="spinner"></div>
      <p class="loader-text">Cargando...</p>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <div id="confirm-modal" class="modal" style="display: none;">
    <div class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title">Confirmar acción</h2>
        </div>
        <div class="modal-body">
          <p></p>
        </div>
        <div class="modal-footer">
          <button class="modal-cancel btn btn-secondary">Cancelar</button>
          <button class="modal-confirm btn btn-primary">Confirmar</button>
        </div>
      </div>
    </div>
  </div>

  <nav class="navbar" id="navbar" style="display: none;">
    <div class="navbar-container">
      <a href="/" class="navbar-brand">EventBook</a>
      <ul class="navbar-menu">
        <li><a href="events.html">Eventos</a></li>
        <li><a href="bookings.html">Mis Reservas</a></li>
        <li data-admin-only style="display: none;"><a href="admin.html">Admin</a></li>
        <li><a href="#" id="logout-btn" onclick="handleLogout(event)">Cerrar Sesión</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <section class="hero">
      <div class="hero-content">
        <h1>Sistema de Reservas de Eventos</h1>
        <p>Descubre y reserva los mejores eventos</p>
        <div class="hero-buttons">
          <a href="events.html" class="btn btn-primary btn-lg">Ver Eventos</a>
          <a href="login.html" class="btn btn-secondary btn-lg">Iniciar Sesión</a>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/api.js"></script>
  
  <script>
    function handleLogout(e) {
      e.preventDefault();
      StorageManager.clearAuth();
      window.location.href = '/login.html';
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      const navbar = document.getElementById('navbar');
      if (StorageManager.isAuthenticated()) {
        navbar.style.display = 'block';
        
        // Show admin link if user is admin
        if (StorageManager.isAdmin()) {
          document.querySelector('[data-admin-only]').style.display = 'block';
        }
      }
    });
  </script>
</body>
</html>
