<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle Evento - EventBooking</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="loader" class="loader" style="display: none;">
    <div class="loader-content"><div class="spinner"></div><p class="loader-text">Cargando...</p></div>
  </div>
  <div id="toast-container" class="toast-container"></div>
  <div id="confirm-modal" class="modal" style="display: none;">
    <div class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header"><h2 class="modal-title">Confirmar acción</h2></div>
        <div class="modal-body"><p></p></div>
        <div class="modal-footer">
          <button class="modal-cancel btn btn-secondary">Cancelar</button>
          <button class="modal-confirm btn btn-primary">Confirmar</button>
        </div>
      </div>
    </div>
  </div>

  <nav class="navbar">
    <div class="navbar-container">
      <a href="/" class="navbar-brand">EventBook</a>
      <ul class="navbar-menu">
        <li><a href="events.html">Eventos</a></li>
        <li><a href="bookings.html">Mis Reservas</a></li>
        <li data-admin-only style="display: none;"><a href="admin.html">Admin</a></li>
        <li><a href="#" id="logout-btn" onclick="handleLogout(event)">Cerrar Sesión</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div style="margin-bottom: 24px;">
      <a href="events.html" style="color: #4361ee; font-weight: 600;">← Volver a Eventos</a>
    </div>

    <div class="flex" style="gap: 32px; flex-wrap: wrap;">
      <div style="flex: 1; min-width: 300px;">
        <div class="card" id="eventDetail">
          <div style="text-align: center; padding: 40px; font-size: 60px;">🎫</div>
        </div>
      </div>

      <div style="flex: 1; min-width: 300px;">
        <div class="card">
          <div class="card-header">
            <h3>Hacer Reserva</h3>
          </div>
          <div class="card-body">
            <form id="bookingForm">
              <div class="form-group">
                <label for="quantity">Cantidad de Entradas</label>
                <input type="number" id="quantity" name="quantity" min="1" value="1" required>
                <div class="form-error" id="quantityError"></div>
              </div>

              <div id="capacityWarning" style="background: #fff3cd; border-left: 4px solid #ffc107; padding: 12px; margin-bottom: 16px; display: none; border-radius: 8px;">
                <p style="margin: 0; color: #856404; font-size: 14px;" id="capacityMessage"></p>
              </div>

              <div style="background: #f8f9fa; padding: 16px; border-radius: 12px; margin-bottom: 16px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                  <span>Precio Unitario:</span>
                  <span id="unitPrice">$0</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-weight: 700; border-top: 1px solid #dee2e6; padding-top: 8px;">
                  <span>Total:</span>
                  <span id="totalPrice">$0</span>
                </div>
              </div>

              <button type="submit" class="btn btn-success btn-lg btn-block">Reservar</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/jwt-utils.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/guards.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/api.js"></script>

  <script>
    if (!RouteGuard.requireAuth()) return;

    const urlParams = new URLSearchParams(window.location.search);
    const eventId = parseInt(urlParams.get('id'));
    let event = null;

    async function loadEvent() {
      UIManager.showLoader('Cargando evento...');
      try {
        event = await APIService.getEventDetail(eventId);
        renderEvent();
      } catch (error) {
        console.error('Error loading event:', error);
        document.getElementById('eventDetail').innerHTML = '<p style="text-align: center; padding: 40px;">Error cargando evento</p>';
      } finally {
        UIManager.hideLoader();
      }
    }

    function renderEvent() {
      const remaining = UIManager.getRemainingCapacity(event.capacity || 0, event.bookedCount || 0);
      const isFull = remaining <= 0;

      document.getElementById('eventDetail').innerHTML = `
        <div class="card-header">
          <h2 style="margin: 0;">${event.name || 'Sin nombre'}</h2>
        </div>
        <div class="card-body">
          <p>${event.description || 'Sin descripción'}</p>
          
          <div style="background: #f8f9fa; padding: 16px; border-radius: 12px; margin-bottom: 16px;">
            <div style="margin-bottom: 12px;">
              <strong>📅 Fecha:</strong> ${UIManager.formatDate(event.date)}
            </div>
            <div style="margin-bottom: 12px;">
              <strong>🕐 Hora:</strong> ${UIManager.formatTime(event.date)}
            </div>
            <div style="margin-bottom: 12px;">
              <strong>💰 Precio:</strong> ${UIManager.formatCurrency(event.price || 0)}
            </div>
            <div>
              <strong>🎫 Disponibles:</strong> 
              <span style="color: ${isFull ? '#dc3545' : remaining < 10 ? '#ffc107' : '#198754'}; font-weight: 700;">
                ${remaining} / ${event.capacity || 0}
              </span>
            </div>
          </div>

          ${isFull ? '<p style="color: #dc3545; font-weight: 600;">Este evento está agotado.</p>' : ''}
        </div>
      `;

      document.getElementById('unitPrice').textContent = UIManager.formatCurrency(event.price || 0);
      updateTotal();

      if (isFull) {
        document.getElementById('bookingForm').style.display = 'none';
      }

      if (remaining > 0 && remaining < 10) {
        document.getElementById('capacityWarning').style.display = 'block';
        document.getElementById('capacityMessage').textContent = `¡Quedan solo ${remaining} entradas disponibles!`;
      }
    }

    function updateTotal() {
      const quantity = parseInt(document.getElementById('quantity').value) || 1;
      const total = (event.price || 0) * quantity;
      document.getElementById('totalPrice').textContent = UIManager.formatCurrency(total);
    }

    document.getElementById('quantity').addEventListener('change', (e) => {
      const remaining = UIManager.getRemainingCapacity(event.capacity || 0, event.bookedCount || 0);
      const quantity = parseInt(e.target.value) || 1;

      document.getElementById('quantityError').textContent = '';

      if (quantity <= 0) {
        document.getElementById('quantityError').textContent = 'La cantidad debe ser mayor a 0';
        e.target.value = 1;
        updateTotal();
        return;
      }

      if (quantity > remaining) {
        document.getElementById('quantityError').textContent = `Solo hay ${remaining} entradas disponibles`;
        e.target.value = remaining;
      }

      updateTotal();
    });

    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const quantity = parseInt(document.getElementById('quantity').value);
      const remaining = UIManager.getRemainingCapacity(event.capacity || 0, event.bookedCount || 0);

      if (quantity <= 0 || quantity > remaining) {
        UIManager.showToast('Cantidad de entradas inválida', 'error');
        return;
      }

      UIManager.showLoader('Procesando reserva...');
      try {
        const booking = await APIService.createBooking(eventId, quantity);
        UIManager.showToast('Reserva creada correctamente', 'success');
        setTimeout(() => {
          window.location.href = '/bookings.html';
        }, 500);
      } catch (error) {
        UIManager.hideLoader();
        console.error('Booking error:', error);
      }
    });

    function handleLogout(e) {
      e.preventDefault();
      StorageManager.clearAuth();
      window.location.href = '/login.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!eventId) {
        document.getElementById('eventDetail').innerHTML = '<p>Evento no especificado</p>';
        return;
      }
      loadEvent();
    });
  </script>
</body>
</html>
