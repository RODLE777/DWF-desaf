<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Eventos - EventBooking">
  <title>Eventos - EventBooking</title>
  
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/events.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/guards.js"></script>
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="navbar-brand">🎫 EventBooking</div>
      <ul class="navbar-nav">
        <li><a href="/dashboard.html">Dashboard</a></li>
        <li><a href="/events.html" class="active">Eventos</a></li>
        <li><a href="/bookings.html">Mis Reservas</a></li>
        <li data-role="admin" style="display: none;"><a href="/admin.html">Administración</a></li>
      </ul>
      <div class="user-menu">
        <div class="user-info">
          <span id="user-name">Usuario</span>
          <div class="user-avatar"><span id="user-initial">U</span></div>
        </div>
        <button class="logout-btn" onclick="AuthService.logout()">Salir</button>
      </div>
    </nav>
  </header>

  <div class="dashboard-container">
    <div class="main-content">
      <div class="page-header">
        <h1 class="page-title">Eventos Disponibles</h1>
      </div>

      <div id="eventsGrid" class="events-grid"></div>
      <div id="eventsLoader"></div>

      <div id="emptyState" class="empty-state" style="display: none;">
        <div class="empty-state-icon">📭</div>
        <h3>No hay eventos disponibles</h3>
        <p>Intenta más tarde</p>
      </div>
    </div>
  </div>

  <script>
    let currentPage = 0;
    const pageSize = 9;

    async function loadEvents(page = 0) {
      try {
        UIService.updateNavigation();
        UIService.showSkeletonLoader('eventsGrid', pageSize);
        
        const response = await api.get(CONFIG.EVENTS.LIST + `?page=${page}&size=${pageSize}`);
        
        if (!response.content || response.content.length === 0) {
          document.getElementById('emptyState').style.display = 'block';
          document.getElementById('eventsGrid').innerHTML = '';
          return;
        }

        const html = response.content.map(event => {
          const availableSpots = event.availableSpots || 0;
          let badge = '<span class="availability-badge availability-full">AGOTADO</span>';
          
          if (availableSpots > 10) {
            badge = '<span class="availability-badge availability-available">DISPONIBLE</span>';
          } else if (availableSpots > 0) {
            badge = '<span class="availability-badge availability-limited">LIMITADO</span>';
          }

          return `
            <div class="event-card">
              <div class="event-card-image">🎫</div>
              <div class="event-card-content">
                <h3 class="event-card-title">${event.title}</h3>
                <div class="event-card-date">📅 ${Utils.formatDate(event.eventDate)}</div>
                <div class="event-card-venue">📍 ${event.venue}</div>
                <div class="event-card-price">${Utils.formatCurrency(event.pricePerTicket)}</div>
                <div class="event-card-availability">
                  ${badge}
                  <span style="font-size: var(--font-size-sm);">${availableSpots} cupos</span>
                </div>
                <div class="event-card-actions">
                  <a href="/event-detail.html?id=${event.idEvent}" class="btn btn-primary" style="flex: 1; text-align: center;">Ver Detalles</a>
                  ${availableSpots > 0 ? `<a href="/event-detail.html?id=${event.idEvent}#booking" class="btn btn-success" style="flex: 1; text-align: center;">Reservar</a>` : `<button class="btn btn-secondary" disabled style="flex: 1;">Agotado</button>`}
                </div>
              </div>
            </div>
          `;
        }).join('');

        document.getElementById('eventsGrid').innerHTML = html;
        document.getElementById('emptyState').style.display = 'none';
      } catch (error) {
        console.error('[Events] Error:', error);
        UIService.showError('Error al cargar eventos');
      }
    }

    document.addEventListener('DOMContentLoaded', () => loadEvents());
  </script>
</body>
</html>
