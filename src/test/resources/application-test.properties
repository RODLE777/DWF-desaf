# ============================================================
# Base de datos H2 para tests (modo MySQL)
# ============================================================
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_UPPER=false;NON_KEYWORDS=USER
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ============================================================
# Inicializaciˇn de datos (desactivada para tests)
# ============================================================
spring.sql.init.mode=never

# ============================================================
# Consola H2 (˙til para depurar)
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# JWT CONFIG (MISMA CLAVE que en application.properties)
# ============================================================
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# ============================================================
# OAuth2 - GitHub (desactivado en tests, pero se necesita para cargar contexto)
# Los valores pueden ser dummy porque no se usan realmente en estos tests
# ============================================================
spring.security.oauth2.client.registration.github.client-id=Ov23liQK2DHuwb1ArBzm
spring.security.oauth2.client.registration.github.client-secret=4839ad36810d0042701fee30ba73b10b8add395c
spring.security.oauth2.client.registration.github.scope=user:email,read:user
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ============================================================
# Logs (˙til para depurar fallos de autenticaciˇn)
# ============================================================
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.sv.udb.edu=DEBUG